<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户信息管理系统</title>
    <link rel="stylesheet" href="css/userManager.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>用户信息管理系统</h1>
            <div style="margin-top: 10px;">
                <a href="login.html" style="color: white; text-decoration: none; margin: 0 10px; font-size: 14px;">登录</a>
                <a href="login.html" style="color: white; text-decoration: none; margin: 0 10px; font-size: 14px;">注册</a>
            </div>
        </header>

        <main class="main-content">
            <div class="toolbar">
                <button id="btnAddUser" class="btn btn-primary">
                    <span class="icon">+</span> 添加用户
                </button>
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="搜索用户名或邮箱..."
                        class="search-input"
                    >
                    <button id="btnSearch" class="btn btn-secondary">搜索</button>
                    <button id="btnClearSearch" class="btn btn-default">清除</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户名</th>
                            <th>邮箱</th>
                            <th>手机号</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination">
            </div>
        </main>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加用户</h2>
                <button id="btnCloseModal" class="btn-close">&times;</button>
            </div>
            <form id="userForm" class="modal-body">
                <input type="hidden" id="userId">
                
                <div class="form-group">
                    <label for="username" class="form-label">用户名 <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required
                        class="form-control"
                        placeholder="请输入用户名"
                    >
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">邮箱 <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        class="form-control"
                        placeholder="请输入邮箱地址"
                    >
                </div>

                <div class="form-group">
                    <label for="phone" class="form-label">手机号</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        class="form-control"
                        placeholder="请输入手机号"
                        pattern="[0-9]{11}"
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" id="btnSubmit" class="btn btn-primary">保存</button>
                    <button type="button" id="btnCancel" class="btn btn-default">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteConfirmModal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2>确认删除</h2>
                <button id="btnCloseDeleteModal" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <p id="deleteConfirmMessage">确定要删除该用户吗？</p>
                <div class="form-actions">
                    <button id="btnConfirmDelete" class="btn btn-danger">删除</button>
                    <button id="btnCancelDelete" class="btn btn-default">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/userManager.js"></script>
</body>
</html>
